version: '3.8'

services:
  # Python FastAPI Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridvision_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Nginx Web Server for the Static Frontend UI
  frontend:
    image: nginx:alpine
    container_name: gridvision_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
